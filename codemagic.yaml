workflows:
  ios-unsigned-workflow:
    name: Build Unsigned iOS IPA (For Sideloadly)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - gemini # Đọc group biến GEMINI_API_KEY từ giao diện web Codemagic
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build iOS unsigned app
        script: |
          flutter build ios --release --no-codesign --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY
      - name: Package into IPA
        script: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -qq -r ../../../IGCheck.ipa Payload
    artifacts:
      - IGCheck.ipa
